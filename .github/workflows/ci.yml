name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  windows:
    name: Windows build and Python checks
    runs-on: windows-2025-vs2026

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up just
        uses: extractions/setup-just@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install NASM
        shell: pwsh
        run: |
          $nasm = Get-Command nasm.exe -ErrorAction SilentlyContinue
          if (-not $nasm) {
            winget install --id NASM.NASM --source winget --accept-package-agreements --accept-source-agreements --disable-interactivity
          }

          $nasmCandidates = @(
            (Join-Path $env:LOCALAPPDATA 'bin\NASM\nasm.exe'),
            'C:\Program Files\NASM\nasm.exe',
            'C:\Program Files (x86)\NASM\nasm.exe',
            'C:\ProgramData\chocolatey\bin\nasm.exe'
          )
          $resolvedNasm = Get-Command nasm.exe -ErrorAction SilentlyContinue
          if ($resolvedNasm) {
            $nasmCandidates += $resolvedNasm.Source
          }
          $nasmExe = $nasmCandidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          if (-not $nasmExe) {
            throw "NASM install completed, but nasm.exe was not found."
          }
          Add-Content -Path $env:GITHUB_PATH -Value (Split-Path -Parent $nasmExe)

      - name: Run CI
        run: just ci

  windows-11-arm-smoke:
    name: Windows 11 ARM smoke
    runs-on: windows-11-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up just
        uses: extractions/setup-just@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: arm64

      - name: Install NASM
        shell: pwsh
        run: |
          $nasm = Get-Command nasm.exe -ErrorAction SilentlyContinue
          if (-not $nasm) {
            $winget = Get-Command winget.exe -ErrorAction SilentlyContinue
            if ($winget) {
              winget install --id NASM.NASM --source winget --accept-package-agreements --accept-source-agreements --disable-interactivity
            } else {
              choco install nasm -y --no-progress
            }
          }

          $nasmCandidates = @(
            (Join-Path $env:LOCALAPPDATA 'bin\NASM\nasm.exe'),
            'C:\Program Files\NASM\nasm.exe',
            'C:\Program Files (x86)\NASM\nasm.exe',
            'C:\ProgramData\chocolatey\bin\nasm.exe'
          )
          $resolvedNasm = Get-Command nasm.exe -ErrorAction SilentlyContinue
          if ($resolvedNasm) {
            $nasmCandidates += $resolvedNasm.Source
          }
          $nasmExe = $nasmCandidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          if (-not $nasmExe) {
            throw "NASM install completed, but nasm.exe was not found."
          }
          Add-Content -Path $env:GITHUB_PATH -Value (Split-Path -Parent $nasmExe)

      - name: Run ARM artifact smoke
        env:
          GARGOYLE_PLATFORM_TOOLSET: v143
        run: just windows-arm-smoke
